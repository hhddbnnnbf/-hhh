<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="图片转换">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>图片格式转换</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #d4f060;
      --accent-dim: rgba(212,240,96,0.12);
      --text: #f0ede6;
      --muted: #888;
      --danger: #ff5f5f;
      --success: #60d4a0;
      --radius: 14px;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    .version {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    /* Drop zone */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(212,240,96,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.7;
    }

    .drop-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .drop-sub {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Section label */
    .section-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      margin-top: 24px;
    }

    /* Format buttons */
    .format-row {
      display: flex;
      gap: 8px;
    }

    .fmt-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .fmt-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Quality slider */
    .quality-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .quality-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
    }

    .quality-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .quality-val {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
      min-width: 34px;
      text-align: right;
    }

    /* File list */
    .file-list { display: flex; flex-direction: column; gap: 8px; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-thumb {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 7px;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .file-info { flex: 1; overflow: hidden; }

    .file-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-status {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .file-status.done { background: rgba(96,212,160,0.15); color: var(--success); }
    .file-status.pending { background: var(--surface2); color: var(--muted); }

    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .del-btn:hover { color: var(--danger); }

    /* Convert button */
    .convert-btn {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #0f0f0f;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: -0.3px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .convert-btn:active { transform: scale(0.98); }
    .convert-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* Empty state hint */
    .hint {
      text-align: center;
      padding: 12px 0;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* Install banner */
    .install-banner {
      display: none;
      margin-top: 24px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .install-banner.show { display: block; }
    .install-banner strong { color: var(--text); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">IMG<span>.</span>CONVERT</div>
    <div class="version">v1.0</div>
  </header>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <span class="drop-icon">🖼️</span>
    <div class="drop-title">点击或拖拽图片</div>
    <div class="drop-sub">JPG · PNG · WebP · BMP · GIF</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">

  <div class="section-label">目标格式</div>
  <div class="format-row" id="formatBtns">
    <button class="fmt-btn active" data-fmt="image/jpeg" data-ext="jpg">JPG</button>
    <button class="fmt-btn" data-fmt="image/png" data-ext="png">PNG</button>
    <button class="fmt-btn" data-fmt="image/webp" data-ext="webp">WebP</button>
  </div>

  <div class="section-label">质量</div>
  <div class="quality-row">
    <input type="range" min="10" max="100" value="90" step="1" id="quality">
    <span class="quality-val" id="qualityVal">90%</span>
  </div>

  <div class="section-label" id="listLabel" style="display:none">待转换文件</div>
  <div class="file-list" id="fileList"></div>

  <div class="hint" id="hint">暂无文件，请上传图片</div>

  <button class="convert-btn" id="convertBtn" disabled>开始转换并下载</button>

  <div class="install-banner" id="installBanner">
    📱 <strong>添加到主屏幕</strong><br>
    Safari → 分享按钮 → 添加到主屏幕
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  let files = [];
  let targetFmt = 'image/jpeg';
  let targetExt = 'jpg';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const convertBtn = document.getElementById('convertBtn');
  const quality = document.getElementById('quality');
  const qualityVal = document.getElementById('qualityVal');
  const hint = document.getElementById('hint');
  const listLabel = document.getElementById('listLabel');

  quality.addEventListener('input', () => { qualityVal.textContent = quality.value + '%'; });

  document.querySelectorAll('.fmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      targetFmt = btn.dataset.fmt;
      targetExt = btn.dataset.ext;
    });
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });

  function addFiles(newFiles) {
    Array.from(newFiles).forEach(f => { if (f.type.startsWith('image/')) files.push({ file: f, done: false }); });
    render();
  }

  function render() {
    fileList.innerHTML = '';
    hint.style.display = files.length ? 'none' : 'block';
    listLabel.style.display = files.length ? 'block' : 'none';
    files.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'file-item';
      const img = document.createElement('img');
      img.className = 'file-thumb';
      img.src = URL.createObjectURL(item.file);
      const info = document.createElement('div');
      info.className = 'file-info';
      info.innerHTML = `<div class="file-name">${item.file.name}</div><div class="file-meta">${(item.file.size/1024).toFixed(0)} KB</div>`;
      const status = document.createElement('span');
      status.className = 'file-status ' + (item.done ? 'done' : 'pending');
      status.textContent = item.done ? '✓ 完成' : '待转';
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '×';
      del.onclick = () => { files.splice(i, 1); render(); };
      el.append(img, info, status, del);
      fileList.appendChild(el);
    });
    convertBtn.disabled = files.length === 0;
  }

  convertBtn.addEventListener('click', async () => {
    if (!files.length) return;
    convertBtn.disabled = true;
    convertBtn.textContent = '转换中…';
    const q = parseInt(quality.value) / 100;
    for (let i = 0; i < files.length; i++) {
      await convert(files[i].file, targetFmt, targetExt, q);
      files[i].done = true;
      render();
      convertBtn.disabled = true;
      convertBtn.textContent = `转换中… ${i+1}/${files.length}`;
    }
    convertBtn.textContent = '✓ 全部完成！';
    setTimeout(() => {
      convertBtn.textContent = '开始转换并下载';
      convertBtn.disabled = false;
    }, 2500);
  });

  function convert(file, fmt, ext, q) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        if (fmt === 'image/jpeg') { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = file.name.replace(/\.[^.]+$/, '') + '.' + ext;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          resolve();
        }, fmt, q);
      };
      img.src = URL.createObjectURL(file);
    });
  }

  // Show install banner on iOS Safari
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone) {
    document.getElementById('installBanner').classList.add('show');
  }
</script>
</body>
</html>
